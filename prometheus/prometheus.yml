global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "llm-gateway"
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8000", "app1:8000", "app2:8000"]
