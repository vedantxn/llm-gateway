groups:
  - name: gateway
    rules:
      - alert: ServiceDown
        expr: llm_gateway_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "LLM Gateway instance is down"
          description: "Instance {{ $labels.instance }} has been down for more than 1 minute."

      - alert: HighErrorRate
        expr: rate(llm_gateway_errors_total[1m]) > 0.1
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 0.1/s for the last minute."
