groups:
  - name: gateway
    rules:
      - alert: ServiceDown
        expr: up{job="llm-gateway"} == 0
        for: 15s
        labels:
          severity: critical
        annotations:
          summary: "LLM Gateway instance is down"
          description: "Instance {{ $labels.instance }} has been down for more than 1 minute."

      - alert: HighErrorRate
        expr: rate(llm_gateway_errors_total[1m]) / clamp_min(rate(llm_gateway_requests_total[1m]), 0.001) > 0.05
        for: 15s
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate exceeded 5 percent for the last minute."

      - alert: HighLatency
        expr: llm_gateway_request_latency_ms_avg > 500
        for: 15s
        labels:
          severity: warning
        annotations:
          summary: "High latency detected"
          description: "Average request latency is above 500ms."
